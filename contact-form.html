<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Form</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0d0d;
      --surface: #151515;
      --border: #2a2a2a;
      --accent: #c9a96e;
      --accent2: #e8c98a;
      --text: #f0ece4;
      --muted: #888;
      --error: #e05a5a;
      --success: #5ace8a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(201, 169, 110, 0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -200px;
      right: -200px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(201, 169, 110, 0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.8rem;
      position: relative;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(28px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Gold top bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), var(--accent), transparent);
      border-radius: 0 0 2px 2px;
    }

    .header {
      margin-bottom: 2.2rem;
      text-align: center;
    }

    .header .eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.6rem;
      font-weight: 500;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .header p {
      margin-top: 0.5rem;
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 300;
    }

    .form-group {
      margin-bottom: 1.4rem;
      animation: fadeUp 0.6s ease both;
    }

    .form-group:nth-child(1) {
      animation-delay: 0.1s;
    }

    .form-group:nth-child(2) {
      animation-delay: 0.15s;
    }

    .form-group:nth-child(3) {
      animation-delay: 0.2s;
    }

    .form-group:nth-child(4) {
      animation-delay: 0.25s;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
      font-size: 1rem;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    input,
    textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem 0.85rem 2.8rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      background: rgba(201, 169, 110, 0.04);
      box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.08);
    }

    input:focus~.icon,
    textarea:focus~.icon {
      opacity: 0.8;
    }

    input::placeholder,
    textarea::placeholder {
      color: #444;
    }

    textarea {
      resize: none;
      height: 90px;
      padding-top: 0.9rem;
    }

    .btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #1a1200;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover:not(:disabled) {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(201, 169, 110, 0.25);
    }

    .btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0, 0, 0, 0.3);
      border-top-color: #1a1200;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .alert {
      display: none;
      padding: 0.85rem 1rem;
      border-radius: 10px;
      font-size: 0.88rem;
      margin-top: 1rem;
      text-align: center;
      animation: fadeUp 0.3s ease;
    }

    .alert.success {
      background: rgba(90, 206, 138, 0.1);
      border: 1px solid rgba(90, 206, 138, 0.25);
      color: var(--success);
      display: block;
    }

    .alert.error {
      background: rgba(224, 90, 90, 0.1);
      border: 1px solid rgba(224, 90, 90, 0.25);
      color: var(--error);
      display: block;
    }

    .field-error {
      font-size: 0.75rem;
      color: var(--error);
      margin-top: 0.3rem;
      display: none;
    }

    input.invalid,
    textarea.invalid {
      border-color: var(--error);
    }

    /* Setup notice */
    .setup-notice {
      background: rgba(201, 169, 110, 0.08);
      border: 1px solid rgba(201, 169, 110, 0.2);
      border-radius: 10px;
      padding: 0.9rem 1.1rem;
      font-size: 0.82rem;
      color: var(--accent2);
      margin-bottom: 1.8rem;
      line-height: 1.6;
    }

    .setup-notice strong {
      color: var(--accent);
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="header">
      <div class="eyebrow">Get in Touch</div>
      <h1>Contact Us</h1>
      <p>Fill in the details below and we'll be in touch shortly.</p>
    </div>

    <!-- ⚠️ REMOVE THIS BLOCK AFTER SETUP -->
    <!-- <div class="setup-notice" id="setupNotice">
    ⚙️ <strong>Setup required:</strong> Replace <code>YOUR_PUBLIC_KEY</code>, <code>YOUR_SERVICE_ID</code>, and <code>YOUR_TEMPLATE_ID</code> in the script below with your <a href="https://emailjs.com" style="color:var(--accent2)">EmailJS</a> credentials.
  </div> -->

    <form id="contactForm" novalidate>
      <div class="form-group">
        <label for="name">Full Name</label>
        <div class="input-wrap">
          <input type="text" id="name" name="name" placeholder="Rahul Sharma" autocomplete="name" />
          <span class="icon">👤</span>
        </div>
        <div class="field-error" id="nameErr">Please enter your name.</div>
      </div>

      <div class="form-group">
        <label for="address">Address</label>
        <div class="input-wrap">
          <textarea id="address" name="address" placeholder="House No, Street, City, State"></textarea>
          <span class="icon" style="top:1.1rem;transform:none;">📍</span>
        </div>
        <div class="field-error" id="addressErr">Please enter your address.</div>
      </div>

      <div class="form-group">
        <label for="mobile">Mobile Number</label>
        <div class="input-wrap">
          <input type="tel" id="mobile" name="mobile" placeholder="+91 98765 43210" autocomplete="tel" />
          <span class="icon">📱</span>
        </div>
        <div class="field-error" id="mobileErr">Please enter a valid mobile number.</div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrap">
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" />
          <span class="icon">✉️</span>
        </div>
        <div class="field-error" id="emailErr">Please enter a valid email address.</div>
      </div>

      <button type="submit" class="btn" id="submitBtn">Send Message</button>

      <div class="alert" id="alertBox"></div>
    </form>
  </div>

  <script>
    // =============================================
    // 🔧 REPLACE THESE WITH YOUR EMAILJS CREDENTIALS
    const EMAILJS_PUBLIC_KEY = "xq2SsJLGLDgLvyw36";   // from Account > API Keys
    const EMAILJS_SERVICE_ID = "service_70sqgwn";   // from Email Services
    const EMAILJS_TEMPLATE_ID = "template_598dzqb";  // from Email Templates
    // =============================================

    emailjs.init(EMAILJS_PUBLIC_KEY);

    const form = document.getElementById('contactForm');
    const btn = document.getElementById('submitBtn');
    const alert = document.getElementById('alertBox');

    function showError(id, show) {
      const el = document.getElementById(id);
      el.style.display = show ? 'block' : 'none';
    }

    function markInvalid(id, invalid) {
      const el = document.getElementById(id);
      el.classList.toggle('invalid', invalid);
    }

    function validate() {
      let ok = true;

      const name = document.getElementById('name').value.trim();
      const address = document.getElementById('address').value.trim();
      const mobile = document.getElementById('mobile').value.trim();
      const email = document.getElementById('email').value.trim();

      const nameOk = name.length >= 2;
      const addressOk = address.length >= 5;
      const mobileOk = /^[+\d\s\-()]{7,15}$/.test(mobile);
      const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

      showError('nameErr', !nameOk); markInvalid('name', !nameOk);
      showError('addressErr', !addressOk); markInvalid('address', !addressOk);
      showError('mobileErr', !mobileOk); markInvalid('mobile', !mobileOk);
      showError('emailErr', !emailOk); markInvalid('email', !emailOk);

      return nameOk && addressOk && mobileOk && emailOk;
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      alert.className = 'alert';
      alert.style.display = 'none';

      if (!validate()) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Sending…';

      const templateParams = {
        from_name: document.getElementById('name').value.trim(),
        address: document.getElementById('address').value.trim(),
        mobile: document.getElementById('mobile').value.trim(),
        from_email: document.getElementById('email').value.trim(),
        to_email: "aryasahilkeorak@gmail.com"
      };

      try {
        await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
        alert.textContent = '✅ Message sent! We\'ll get back to you soon.';
        alert.className = 'alert success';
        form.reset();
        ['name', 'address', 'mobile', 'email'].forEach(id => markInvalid(id, false));
      } catch (err) {
        alert.textContent = '❌ Something went wrong. Please try again.';
        alert.className = 'alert error';
        console.error(err);
      }

      btn.disabled = false;
      btn.innerHTML = 'Send Message';
    });

    // Live validation clear on input
    ['name', 'address', 'mobile', 'email'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        markInvalid(id, false);
        showError(id + 'Err', false);
      });
    });
  </script>
</body>

</html>
